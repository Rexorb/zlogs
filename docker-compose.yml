version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zlogs-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: zlogs
      POSTGRES_USER: zlogs
      POSTGRES_PASSWORD: zlogs

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zlogs -d zlogs"]
      interval: 10s
      timeout: 5s
      retries: 5

  zlogs:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: zlogs-app

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PORT: 3000

      DATABASE_URL: >
        host=postgres
        port=5432
        user=zlogs
        password=zlogs
        dbname=zlogs

    ports:
      - "3000:3000"

volumes:
  postgres_data:
